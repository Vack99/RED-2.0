# RED 2.0 scope model — schema: docs/superpowers/wayfinder/2026-07-14-T2-scope-model-schema.md
# Assembled 2026-07-14 from the T1 (Foundation) / T3 (product-ahead) / T4 (business) wayfinder assets; map #105, spec #119.
# How to add work: add a new quest block carrying a `quest:*` label, or tag an existing issue with an existing quest label.
# Frozen (shipped) quests enumerate their closed issues as ranges; active/future quests carry a per-quest label so new issues auto-join.
# Foundation phase ranges own #1–#104 as the single bar source; earned-ahead quests in worlds 2–7 cite those issues as `evidence` (related, not a bar source).

repo: Vack99/RED-2.0
destination: "RED is sellable across Latin America"

